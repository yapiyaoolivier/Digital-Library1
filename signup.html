<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Hub - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="signup-page">
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <div class="spinner-circle"></div>
                <div class="spinner-circle"></div>
            </div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="header-top">
            <div class="logo-section">
                <i class="fas fa-book-open"></i>
                <h1>Scholar Hub</h1>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn-login" title="Sign In">
                    <i class="fas fa-sign-in-alt"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- Signup Section -->
    <section class="signup-section">
        <div class="signup-container">
            <div class="signup-form-wrapper">
                <h2>Create Your Account</h2>
                <p>Join Scholar Hub and access comprehensive learning resources</p>
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="signupName"><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                        <span class="error-message" id="signupNameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail"><i class="fas fa-envelope"></i> IUGB Email</label>
                        <input type="email" id="signupEmail" placeholder="john.doe@iugb" required>
                        <span class="error-message" id="signupEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="signupPassword" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="signupPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label for="signupConfirm"><i class="fas fa-lock"></i> Confirm Password</label>
                        <div class="password-input">
                            <input type="password" id="signupConfirm" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('signupConfirm')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="signupConfirmError"></span>
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                    <p class="form-switch">Already have an account? <a href="index.html">Sign In</a></p>
                </form>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
