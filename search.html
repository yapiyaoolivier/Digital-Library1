<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Hub - Search Books</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="search-page">
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <div class="spinner-circle"></div>
                <div class="spinner-circle"></div>
            </div>
            <p>Loading...</p>
        </div>
    </div>

    <header class="app-header">
        <div class="header-top">
            <button class="btn-back" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Search Books</h1>
            <a href="premium.html" class="btn-premium-header">
                <i class="fas fa-gem"></i>
            </a>
        </div>
    </header>

    <section class="resource-hero">
        <h2>Find the right book faster</h2>
        <p>Search across all books in the library by title, author, course, or keyword.</p>
    </section>

    <section class="books-container">
        <div class="book-search">
            <i class="fas fa-search"></i>
            <input type="search" id="globalBookSearch" placeholder="Search all books">
        </div>
        <p class="resource-count" id="searchResultCount">0 results</p>
        <div id="searchResults" class="books-grid"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
