<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Hub - Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <div class="spinner-circle"></div>
                <div class="spinner-circle"></div>
            </div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Animated Background -->
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-logo">
            <div class="logo-animation">
                <i class="fas fa-book"></i>
            </div>
            <h1>Scholar Hub</h1>
            <p>Digital Learning Platform</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <h2>Sign In</h2>
            <div class="form-group">
                <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="loginEmail" placeholder="student@iugb" required>
                <span class="error-message" id="loginEmailError"></span>
            </div>
            <div class="form-group">
                <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                <div class="password-input">
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="error-message" id="loginPasswordError"></span>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
            <p class="form-switch">Don't have an account? <a href="signup.html">Create One</a></p>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form">
            <h2>Create Account</h2>
            <div class="form-group">
                <label for="signupName"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe" required>
                <span class="error-message" id="signupNameError"></span>
            </div>
            <div class="form-group">
                <label for="signupEmail"><i class="fas fa-envelope"></i> IUGB Email</label>
                <input type="email" id="signupEmail" placeholder="john.doe@iugb" required>
                <span class="error-message" id="signupEmailError"></span>
            </div>
            <div class="form-group">
                <label for="signupPassword"><i class="fas fa-lock"></i> Password</label>
                <div class="password-input">
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="error-message" id="signupPasswordError"></span>
            </div>
            <div class="form-group">
                <label for="signupConfirm"><i class="fas fa-lock"></i> Confirm Password</label>
                <div class="password-input">
                    <input type="password" id="signupConfirm" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('signupConfirm')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="error-message" id="signupConfirmError"></span>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
            <p class="form-switch">Already have an account? <a href="#" onclick="switchForm(event)">Sign In</a></p>
        </form>
    </div>

    <script src="app.js"></script>
</body>

</html>
